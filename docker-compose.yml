services:
  app:
    build: .
    networks:
      - vswitch0
    env_file: .env
    environment:
      FLASK_ENV: 'development'
    ports:
      - "80:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 10s
      retries: 5
      start_period: 1s
    volumes:
      - .:/rotk.net
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      # Local-dev postgres. Container is initialised from POSTGRES_USER,
      # POSTGRES_PASSWORD, and POSTGRES_DB on first boot (when the data
      # volume is empty). On the VPS this service is dropped by the
      # override; the app talks to shared postgres instead.
      POSTGRES_USER: ${POSTGRES_USER:-rotk_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-localdev-only}
      POSTGRES_DB: ${POSTGRES_DB:-rotk_net}
    networks:
      - vswitch0
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    volumes:
      - ./db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rotk_app} -d ${POSTGRES_DB:-rotk_net}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

networks:
  vswitch0:
    driver: bridge
