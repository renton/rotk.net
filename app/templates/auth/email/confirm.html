<!doctype html>
<html lang="en">
  <body style="font-family: sans-serif; max-width: 480px; margin: 24px;">
    <p>Hi {{ user.username }},</p>
    <p>Confirm your rotk.net account:</p>
    <p>
      <a href="{{ url_for('auth.confirm', token=token, _external=True) }}"
         style="background:#0d6efd; color:#fff; padding:10px 16px; text-decoration:none; border-radius:4px;">
        Confirm my account
      </a>
    </p>
    <p style="color:#666; font-size:0.9em;">
      Or paste this URL into your browser:<br>
      <code>{{ url_for('auth.confirm', token=token, _external=True) }}</code>
    </p>
    <p style="color:#666; font-size:0.9em;">This link expires in 24 hours. If you didn't sign up, you can ignore this email.</p>
    <p>— rotk.net</p>
  </body>
</html>
