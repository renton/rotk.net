  services:
    # Strip the bundled postgres — we use the shared one.
    db: !reset null

    app:
      container_name: rotk-app
      restart: unless-stopped
      # The shared postgres lives in the boilerplate stack; drop the dev-only
      # depends_on that pointed at the now-deleted local db.
      depends_on: !reset []
      # Don't publish a host port — Caddy reaches us over the shared network.
      ports: !reset []
      # Drop the dev source bind-mount so the container runs the image we built,
      # but keep a named volume for downloaded portraits — otherwise every
      # `up -d --build` would destroy the container's writable layer and wipe
      # the scraped images. The volume preserves them across rebuilds.
      volumes: !reset
        - portraits_data:/rotk.net/app/static/portraits
      # Base healthcheck targets flask-run's :5000; gunicorn binds :8081 in prod.
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8081"]
        interval: 10s
        retries: 5
        start_period: 5s
      environment:
        FLASK_ENV: production
        POSTGRES_HOST: postgres
        POSTGRES_PORT: "5432"
        POSTGRES_USER: rotk_app
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: rotk_net
      networks:
        - vswitch0
        - shared

  networks:
    shared:
      name: shared
      external: true

  volumes:
    portraits_data:
      # Persistent named volume for scraped character portraits. Lives outside
      # the container lifecycle so rebuilds keep the downloaded images.
